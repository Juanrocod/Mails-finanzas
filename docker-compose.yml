services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gestion_mails
      POSTGRES_USER: gestion
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gestion -d gestion_mails"]
      interval: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://gestion:${DB_PASSWORD:-changeme}@db:5432/gestion_mails
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?Set ENCRYPTION_KEY in .env}
      TOTP_ISSUER: ${TOTP_ISSUER:-GestionMails}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
